<!-- SPA Fallback Router -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jivanta Global Revenue OS</title>
  <!-- Load critical styles -->
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
  <script>
    window.addEventListener('error', function(e) {
      const loader = document.getElementById('loadingScreen');
      if (loader) {
        let msg = e.message || 'Resource failed to load';
        let src = '';
        if (e.target && (e.target.src || e.target.href)) {
          msg = `Failed to load resource: ${e.target.src || e.target.href}`;
          src = e.target.tagName;
        } else if (e.filename) {
          src = `${e.filename.split('/').pop()}:${e.lineno}:${e.colno}`;
        }
        loader.innerHTML = `
          <div style="background: rgba(220, 38, 38, 0.95); padding: 24px; border-radius: 8px; max-width: 500px; color: white; text-align: left; font-family: monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); line-height: 1.5; margin: 20px auto;">
            <h3 style="margin-top: 0; color: #fecaca; display: flex; align-items: center; gap: 8px; font-size: 16px;">⚠️ System Load Exception</h3>
            <p style="margin-bottom: 8px; font-size: 13px;"><strong>Error:</strong> ${msg}</p>
            ${src ? `<p style="margin-bottom: 8px; font-size: 13px;"><strong>Source:</strong> ${src}</p>` : ''}
            <button onclick="window.location.reload(true)" style="background: white; color: black; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 12px; transition: background 0.2s;">Force Reload</button>
          </div>
        `;
      }
    }, true); // Enable capturing phase
    window.addEventListener('unhandledrejection', function(e) {
      const loader = document.getElementById('loadingScreen');
      if (loader) {
        loader.innerHTML = `
          <div style="background: rgba(220, 38, 38, 0.95); padding: 24px; border-radius: 8px; max-width: 500px; color: white; text-align: left; font-family: monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); line-height: 1.5; margin: 20px auto;">
            <h3 style="margin-top: 0; color: #fecaca; display: flex; align-items: center; gap: 8px; font-size: 16px;">⚠️ Promise Rejection</h3>
            <p style="margin-bottom: 8px; font-size: 13px;"><strong>Reason:</strong> ${e.reason}</p>
            <button onclick="window.location.reload(true)" style="background: white; color: black; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 12px; transition: background 0.2s;">Force Reload</button>
          </div>
        `;
      }
    });
  </script>
</head>
<body class="loading-state">
  <!-- Loading screen overlay -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <div class="loading-logo-glow">⚡</div>
      <h2 style="font-weight: 700; font-size: 1.5rem; letter-spacing: -0.025em; margin-bottom: var(--space-1);">JIVANTA</h2>
      <p style="color: var(--text-muted); font-size: var(--text-xs); letter-spacing: 0.1em; text-transform: uppercase;">Revenue OS</p>
    </div>
  </div>

  <!-- Root layout container -->
  <div id="app"></div>

  <!-- Modal root -->
  <div id="modalRoot"></div>

  <!-- Toast notifications container -->
  <div id="toast-container" class="toast-container"></div>

  <noscript>
    <div style="padding: 2rem; text-align: center; background: #111; color: #fff; font-family: sans-serif;">
      <h2>JavaScript Required</h2>
      <p>Please enable JavaScript in your browser to access the CRM portal.</p>
    </div>
  </noscript>

  <!-- Core ESM application bundle -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
