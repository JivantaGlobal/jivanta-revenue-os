<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jivanta Global Revenue OS</title>
  <meta name="description" content="Enterprise Revenue Operating System for Jivanta Global Pvt Ltd — CRM, Sales Pipeline, Export Management">
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <script>
    window.addEventListener('error', function(e) {
      const loader = document.getElementById('loadingScreen');
      if (loader) {
        loader.innerHTML = `
          <div style="background: rgba(220, 38, 38, 0.95); padding: 24px; border-radius: 8px; max-width: 500px; color: white; text-align: left; font-family: monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); line-height: 1.5; margin: 20px auto;">
            <h3 style="margin-top: 0; color: #fecaca; display: flex; align-items: center; gap: 8px; font-size: 16px;">⚠️ System Load Exception</h3>
            <p style="margin-bottom: 8px; font-size: 13px;"><strong>Error:</strong> ${e.message}</p>
            <p style="margin-bottom: 8px; font-size: 13px;"><strong>Source:</strong> ${e.filename.split('/').pop()}:${e.lineno}:${e.colno}</p>
            <button onclick="window.location.reload(true)" style="background: white; color: black; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 12px; transition: background 0.2s;">Force Reload</button>
          </div>
        `;
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      const loader = document.getElementById('loadingScreen');
      if (loader) {
        loader.innerHTML = `
          <div style="background: rgba(220, 38, 38, 0.95); padding: 24px; border-radius: 8px; max-width: 500px; color: white; text-align: left; font-family: monospace; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); line-height: 1.5; margin: 20px auto;">
            <h3 style="margin-top: 0; color: #fecaca; display: flex; align-items: center; gap: 8px; font-size: 16px;">⚠️ Promise Rejection</h3>
            <p style="margin-bottom: 8px; font-size: 13px;"><strong>Reason:</strong> ${e.reason}</p>
            <button onclick="window.location.reload(true)" style="background: white; color: black; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 12px; font-size: 12px; transition: background 0.2s;">Force Reload</button>
          </div>
        `;
      }
    });
  </script>
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Loading Screen (shown before JS loads) -->
    <div id="loadingScreen" class="loading-screen">
      <div class="loading-brand">
        <div class="loading-logo">⚡</div>
        <h1 class="loading-title">Jivanta Global</h1>
        <p class="loading-subtitle">Revenue OS</p>
        <div class="loading-bar">
          <div class="loading-bar-fill"></div>
        </div>
        <p class="loading-status">Initializing system...</p>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Root -->
  <div id="modalRoot"></div>

  <!-- Confirm Dialog Root -->
  <div id="confirmRoot"></div>

  <!-- App Scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>
  <noscript>
    <div style="padding: 2rem; text-align: center; color: #fff; background: #030712; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;">
      <h2>JavaScript is required to run Jivanta Global Revenue OS.</h2>
    </div>
  </noscript>
</body>
</html>
