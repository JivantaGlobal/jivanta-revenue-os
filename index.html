<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jivanta Global Revenue OS</title>
  <meta name="description" content="Enterprise Revenue Operating System for Jivanta Global Pvt Ltd — CRM, Sales Pipeline, Export Management">
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Loading Screen (shown before JS loads) -->
    <div id="loadingScreen" class="loading-screen">
      <div class="loading-brand">
        <div class="loading-logo">⚡</div>
        <h1 class="loading-title">Jivanta Global</h1>
        <p class="loading-subtitle">Revenue OS</p>
        <div class="loading-bar">
          <div class="loading-bar-fill"></div>
        </div>
        <p class="loading-status">Initializing system...</p>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Root -->
  <div id="modalRoot"></div>

  <!-- Confirm Dialog Root -->
  <div id="confirmRoot"></div>

  <!-- App Scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>
  <noscript>
    <div style="padding: 2rem; text-align: center; color: #fff; background: #030712; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;">
      <h2>JavaScript is required to run Jivanta Global Revenue OS.</h2>
    </div>
  </noscript>
</body>
</html>
